{% extends 'base.html' %}
{% block title %}{{ action }} Student — GPA Tracker{% endblock %}
{% block content %}
<h2>{{ action }} Student</h2>
<form method="POST" class="form-card">
  {% if not student %}
  <div class="form-group">
    <label for="student_id">Student ID</label>
    <input type="text" id="student_id" name="student_id" class="form-control" required>
  </div>
  {% endif %}
  <div class="form-group">
    <label for="first_name">First Name</label>
    <input type="text" id="first_name" name="first_name" class="form-control"
           value="{{ student.first_name if student else '' }}" required>
  </div>
  <div class="form-group">
    <label for="last_name">Last Name</label>
    <input type="text" id="last_name" name="last_name" class="form-control"
           value="{{ student.last_name if student else '' }}" required>
  </div>
  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" class="form-control"
           value="{{ student.email if student else '' }}" required>
  </div>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary">{{ action }} Student</button>
    <a href="{{ url_for('students.list_students') }}" class="btn btn-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
