{% extends 'base.html' %}
{% block title %}Add Grade — GPA Tracker{% endblock %}
{% block content %}
<h2>Add Grade</h2>
<form method="POST" class="form-card">
  <div class="form-group">
    <label for="student_id">Student</label>
    <select id="student_id" name="student_id" class="form-control" required>
      <option value="">Select student...</option>
      {% for student in students %}
      <option value="{{ student.id }}"
        {{ 'selected' if student.id | string == preselect_student }}>
        {{ student.full_name }} ({{ student.student_id }})
      </option>
      {% endfor %}
    </select>
  </div>
  <div class="form-group">
    <label for="subject_id">Subject</label>
    <select id="subject_id" name="subject_id" class="form-control" required>
      <option value="">Select subject...</option>
      {% for subject in subjects %}
      <option value="{{ subject.id }}">{{ subject.code }} — {{ subject.name }} ({{ subject.credit_hours }} cr)</option>
      {% endfor %}
    </select>
    {% if not subjects %}
    <p class="form-hint">No subjects yet. <a href="{{ url_for('grades.subjects') }}">Add subjects first.</a></p>
    {% endif %}
  </div>
  <div class="form-group">
    <label for="letter_grade">Grade</label>
    <select id="letter_grade" name="letter_grade" class="form-control" required>
      <option value="">Select grade...</option>
      {% for g in grade_options %}
      <option value="{{ g }}">{{ g }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="form-group">
    <label for="semester">Semester</label>
    <input type="text" id="semester" name="semester" class="form-control"
           placeholder="e.g. Fall 2024" required>
  </div>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Save Grade</button>
    <a href="{{ url_for('students.list_students') }}" class="btn btn-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
